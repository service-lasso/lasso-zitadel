name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            artifact: dist/lasso-zitadel-v4.14.0-win32.zip
          - os: ubuntu-latest
            platform: linux
            artifact: dist/lasso-zitadel-v4.14.0-linux.tar.gz
          - os: macos-15-intel
            platform: darwin
            artifact: dist/lasso-zitadel-v4.14.0-darwin.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Verify package
        run: npm test
        env:
          TARGET_PLATFORM: ${{ matrix.platform }}
          ZITADEL_VERSION: v4.14.0

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: lasso-zitadel-${{ matrix.platform }}
          path: ${{ matrix.artifact }}

      - name: Upload verify output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-${{ matrix.platform }}
          path: output/verify
          if-no-files-found: warn

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: lasso-zitadel-*
          merge-multiple: true

      - name: Copy service manifest into release assets
        shell: bash
        run: |
          set -euo pipefail
          cp service.json release-assets/service.json

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum \
            lasso-zitadel-v4.14.0-win32.zip \
            lasso-zitadel-v4.14.0-linux.tar.gz \
            lasso-zitadel-v4.14.0-darwin.tar.gz \
            service.json \
            > SHA256SUMS.txt

      - name: Compute release version
        id: version
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          version="$(date -u +%Y.%-m.%-d)-${short_sha}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/lasso-zitadel-v4.14.0-win32.zip
            release-assets/lasso-zitadel-v4.14.0-linux.tar.gz
            release-assets/lasso-zitadel-v4.14.0-darwin.tar.gz
            release-assets/service.json
            release-assets/SHA256SUMS.txt
          generate_release_notes: true
